# RUN OR DIE hinter nginx — hdd ist NUR Backend (Relay + Konten-API).
# Das Spiel-Frontend liegt auf GitHub Pages (https://fl4p.github.io/runordie/).
# Einbinden im HTTPS-server-Block: include snippets/runordie.conf;
# (Datei nach /etc/nginx/snippets/runordie.conf, dann nginx -t && reload)
#   Relay:  wss://<host>/runordie/ws        API: https://<host>/runordie/api/…

# Wer /runordie(/) am Backend aufruft, gehört aufs Frontend — dorthin umleiten
location = /runordie  { return 302 https://fl4p.github.io/runordie/; }
location = /runordie/ { return 302 https://fl4p.github.io/runordie/; }

location = /runordie/ws {
    proxy_pass http://127.0.0.1:18931/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
    # Lange Spielsessions: Standard-60s-Timeouts würden die Verbindung kappen
    # (das Relay pingt alle 10 s, also reicht read_timeout > 10 s locker)
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
}

# Konten-API (CORS-Header setzt der Node-Prozess selbst und werden durchgereicht)
location /runordie/api/ {
    proxy_pass http://127.0.0.1:18931/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
}
