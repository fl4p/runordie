# RUN OR DIE hinter nginx: in den HTTPS-server-Block der Site einbinden mit
#   include snippets/runordie.conf;
# (Datei nach /etc/nginx/snippets/runordie.conf kopieren, dann nginx -t && reload)
# Spiel:  https://<host>/runordie/   ·  Relay-WebSocket: wss://<host>/runordie/ws

location = /runordie { return 301 /runordie/; }

location = /runordie/ws {
    proxy_pass http://127.0.0.1:18931/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header X-Forwarded-For $remote_addr;
    # Lange Spielsessions: Standard-60s-Timeouts würden die Verbindung kappen
    # (das Relay pingt alle 10 s, also reicht read_timeout > 10 s locker)
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
}

location /runordie/ {
    proxy_pass http://127.0.0.1:18931/;
    proxy_set_header X-Forwarded-For $remote_addr;
}
